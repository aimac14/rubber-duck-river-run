<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#2A7E78" />
  <title>Rubber Duck River Run</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='13' font-size='13'%3E🦆%3C/text%3E%3C/svg%3E" />
  <style>
    /* === LAYOUT (mobile, portrait, fullscreen) === */
    html, body {
      margin: 0;
      height: 100%;
      background: #0c1413;
      overflow: hidden;
      font-family: "Trebuchet MS", system-ui, sans-serif;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }
    #wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Canvas wird mit nearest-neighbour hochskaliert -> knackige Pixel */
    #c {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #3CAEA3;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.55);
      display: block;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <!-- Interne Auflaesung fix 180x320 (9:16), per CSS hochskaliert -->
    <canvas id="c" width="180" height="320"></canvas>
  </div>

  <script>
  (() => {
    "use strict";

    // ================================================================
    // === KONSTANTEN & PALETTE ("Sunny River") =======================
    // ================================================================
    const W = 180, H = 320;          // logische Pixel-Aufloesung
    const COL = {
      duck:      "#FFD93D",          // Enten-Koerper (Held)
      beak:      "#FF8C42",          // Schnabel / Akzent
      water:     "#3CAEA3",          // Wasser
      waterDeep: "#2A7E78",          // Wasser-Tiefe / Schatten
      foam:      "#E8F6F3",          // Schaum / Highlights
      obstacle:  "#4A3B34",          // Felsen / Holz
      item:      "#FF5DA2",          // Items / Power-ups (Signalfarbe)
    };

    // ================================================================
    // === CANVAS & RESPONSIVE SKALIERUNG =============================
    // ================================================================
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");
    ctx.imageSmoothingEnabled = false;

    // Groesste 9:16-Box, die in den Viewport passt (fit width/height)
    function resize() {
      const vw = window.innerWidth, vh = window.innerHeight;
      const scale = Math.min(vw / W, vh / H);
      canvas.style.width  = Math.round(W * scale) + "px";
      canvas.style.height = Math.round(H * scale) + "px";
    }
    window.addEventListener("resize", resize);
    resize();

    // ================================================================
    // === SPIELZUSTAND ===============================================
    // ================================================================
    const STATE = { START: "start", PLAY: "play", OVER: "over" };
    let state = STATE.START;

    let best = +(localStorage.getItem("rdrr_best") || 0);
    let score = 0;
    let dist = 0;            // zurueckgelegte Distanz (treibt Score & Tempo)
    let speed = 0;           // aktuelle Scroll-Geschwindigkeit (px/s)
    let scrollY = 0;         // Versatz fuer Hintergrund-Wellen
    let newBest = false;     // im aktuellen Lauf neuer Rekord erzielt?
    let spawnTimer = 0;      // Countdown bis zum naechsten Hindernis (s)
    let itemTimer = 0;       // Countdown bis zum naechsten Item (s)
    let whirlTimer = 0;      // Countdown bis zum naechsten Whirlpool (s)
    let bonus = 0;           // Bonuspunkte aus eingesammelten Quietschern

    // Die Ente bleibt vertikal etwa mittig, Welt scrollt an ihr vorbei
    // shield = Seifenblase aktiv, turbo/invuln = Restzeit in Sekunden
    const duck = { x: W / 2, y: H * 0.64, targetX: W / 2, tilt: 0, shield: false, turbo: 0, invuln: 0 };

    // Container fuer Spielobjekte
    const obstacles = [];
    const items = [];          // Quietsche-Collectibles + Power-ups
    const whirls = [];         // Whirlpools (Sog)
    const particles = [];

    // Schaum-Streifen fuer die Wasser-Animation
    let foam = [];
    function initFoam() {
      foam = [];
      for (let i = 0; i < 14; i++) {
        foam.push({
          x: Math.random() * W,
          y: Math.random() * H,
          w: 6 + Math.random() * 14,
          deep: Math.random() < 0.4,   // dunklere Tiefe-Streifen
        });
      }
    }
    initFoam();

    // ================================================================
    // === INPUT (nur Touch / Pointer) ================================
    // ================================================================
    // Bildschirm-Koordinaten in logische Canvas-Koordinaten umrechnen
    function pointerX(e) {
      const r = canvas.getBoundingClientRect();
      return ((e.clientX - r.left) / r.width) * W;
    }

    function onDown(e) {
      e.preventDefault();
      if (state === STATE.START) { startGame(); }
      else if (state === STATE.OVER) { startGame(); }
      duck.targetX = clamp(pointerX(e), 8, W - 8);
    }
    function onMove(e) {
      if (state !== STATE.PLAY) return;
      e.preventDefault();
      duck.targetX = clamp(pointerX(e), 8, W - 8);
    }
    canvas.addEventListener("pointerdown", onDown, { passive: false });
    window.addEventListener("pointermove", onMove, { passive: false });

    // ================================================================
    // === SPIEL-START / RESET ========================================
    // ================================================================
    function startGame() {
      state = STATE.PLAY;
      score = 0;
      dist = 0;
      speed = 70;                 // sanfter Start (erste Sekunden leicht)
      duck.x = W / 2;
      duck.targetX = W / 2;
      duck.tilt = 0;
      obstacles.length = 0;
      items.length = 0;
      whirls.length = 0;
      particles.length = 0;
      bonus = 0;
      duck.shield = false;
      duck.turbo = 0;
      duck.invuln = 0;
      newBest = false;
      spawnTimer = 1.4;           // erste ~1,5s bewusst ruhig (fairer Start)
      itemTimer = 2.2;
      whirlTimer = 6.0;           // Whirlpools erst spaeter im Lauf
    }

    // ================================================================
    // === SPAWNING (Hindernisse von oben) ============================
    // ================================================================
    function spawnObstacle() {
      if (Math.random() < 0.55) {
        // Felsen: kompakt, etwas unregelmaessig
        const s = 13 + Math.random() * 11;
        obstacles.push({
          type: "rock", x: 12 + Math.random() * (W - 24), y: -s,
          w: s, h: s, rot: 0, rotSpeed: 0,
        });
      } else {
        // Treibholz: breiter Balken, leichte Drehung
        const w = 34 + Math.random() * 38;
        obstacles.push({
          type: "log", x: w / 2 + Math.random() * (W - w), y: -12,
          w: w, h: 11, rot: (Math.random() - 0.5) * 0.2,
          rotSpeed: (Math.random() - 0.5) * 0.25,
        });
      }
    }

    // Items: meist Quietsche (Punkte), selten Schild oder Turbo
    function spawnItem() {
      const r = Math.random();
      const type = r < 0.72 ? "squeak" : r < 0.86 ? "shield" : "turbo";
      items.push({ type, x: 14 + Math.random() * (W - 28), y: -10, t: 0 });
    }

    // Whirlpool: zieht die Ente Richtung Zentrum (nicht toedlich, aber gefaehrlich)
    function spawnWhirl() {
      whirls.push({ x: 24 + Math.random() * (W - 48), y: -30, r: 34, angle: 0 });
    }

    // ================================================================
    // === UPDATE (Logik, Delta-Time in Sekunden) =====================
    // ================================================================
    function update(dt) {
      // Power-up-Timer herunterzaehlen
      if (duck.turbo > 0) duck.turbo -= dt;
      if (duck.invuln > 0) duck.invuln -= dt;

      // Schwierigkeit: Tempo steigt langsam mit der Distanz; Turbo beschleunigt
      const base = 70 + Math.min(160, dist * 0.012);
      speed = duck.turbo > 0 ? base * 1.7 : base;
      dist += speed * dt;
      score = Math.floor(dist / 10) + bonus;

      // Ente folgt dem Finger weich (ease), Neigung zeigt Richtung
      const prevX = duck.x;
      duck.x += (duck.targetX - duck.x) * Math.min(1, dt * 12);
      const dx = duck.x - prevX;
      duck.tilt += ((clamp(dx * 0.12, -0.35, 0.35)) - duck.tilt) * Math.min(1, dt * 10);

      // Wasser-Animation scrollt nach unten
      scrollY = (scrollY + speed * dt) % H;
      for (const f of foam) {
        f.y += speed * dt;
        if (f.y > H) { f.y -= H; f.x = Math.random() * W; }
      }

      // Hindernisse spawnen (Rate steigt langsam mit der Distanz)
      spawnTimer -= dt;
      if (spawnTimer <= 0) {
        spawnObstacle();
        spawnTimer = clamp(1.15 - dist * 0.00007, 0.5, 1.15);
      }

      // Hindernisse bewegen, Kollision pruefen, aufraeumen
      for (let i = obstacles.length - 1; i >= 0; i--) {
        const o = obstacles[i];
        o.y += speed * dt;
        o.rot += o.rotSpeed * dt;
        // Hitbox etwas kleiner als Sprite -> fair zum Spieler
        if (duck.invuln <= 0 && hitCircleRect(duck.x, duck.y, 7, o.x - o.w / 2, o.y - o.h / 2, o.w, o.h)) {
          if (duck.shield) {
            // Seifenblase faengt einen Treffer ab und platzt
            duck.shield = false;
            duck.invuln = 0.8;
            obstacles.splice(i, 1);
            continue;
          }
          gameOver();
          return;
        }
        if (o.y - o.h > H + 20) obstacles.splice(i, 1);
      }

      // Items bewegen + einsammeln
      for (let i = items.length - 1; i >= 0; i--) {
        const it = items[i];
        it.y += speed * dt;
        it.t += dt;
        if (hitCircleRect(duck.x, duck.y, 9, it.x - 6, it.y - 6, 12, 12)) {
          collectItem(it.type);
          items.splice(i, 1);
          continue;
        }
        if (it.y - 10 > H + 20) items.splice(i, 1);
      }

      // Whirlpools bewegen + Sog auf die Ente ausueben
      for (let i = whirls.length - 1; i >= 0; i--) {
        const wp = whirls[i];
        wp.y += speed * dt;
        wp.angle += dt * 2.5;
        const wx = wp.x - duck.x, wy = wp.y - duck.y;
        const d = Math.hypot(wx, wy);
        if (d < wp.r && d > 0.1) {
          const pull = (1 - d / wp.r) * 70 * dt;   // Sog staerker je naeher am Zentrum
          duck.x = clamp(duck.x + (wx / d) * pull, 8, W - 8);
        }
        if (wp.y - wp.r > H + 20) whirls.splice(i, 1);
      }

      // Item- und Whirlpool-Spawner
      itemTimer -= dt;
      if (itemTimer <= 0) { spawnItem(); itemTimer = 1.6 + Math.random() * 1.8; }
      whirlTimer -= dt;
      if (whirlTimer <= 0) { spawnWhirl(); whirlTimer = clamp(7 - dist * 0.0001, 3.5, 7) + Math.random() * 2; }
    }

    // Effekt beim Einsammeln eines Items
    function collectItem(type) {
      if (type === "squeak") bonus += 15;
      else if (type === "shield") duck.shield = true;
      else if (type === "turbo") { duck.turbo = 3.2; duck.invuln = 3.2; }
    }

    // ================================================================
    // === GAME-OVER ==================================================
    // ================================================================
    function gameOver() {
      state = STATE.OVER;
      newBest = score > best;
      if (newBest) {
        best = score;
        localStorage.setItem("rdrr_best", String(best));
      }
    }

    // ================================================================
    // === RENDER =====================================================
    // ================================================================
    function drawWater() {
      ctx.fillStyle = COL.water;
      ctx.fillRect(0, 0, W, H);
      // ruhige Wellen-/Schaum-Streifen (Tiefe + Highlights)
      for (const f of foam) {
        ctx.fillStyle = f.deep ? COL.waterDeep : COL.foam;
        ctx.globalAlpha = f.deep ? 0.35 : 0.55;
        ctx.fillRect(Math.round(f.x), Math.round(f.y), f.w, 2);
      }
      ctx.globalAlpha = 1;
    }

    // Pixel-Helfer
    function px(x, y, w, h, color) { ctx.fillStyle = color; ctx.fillRect(x, y, w, h); }

    // Felsen / Treibholz als Pixel-Sprite
    function drawObstacle(o) {
      ctx.save();
      ctx.translate(Math.round(o.x), Math.round(o.y));

      if (o.type === "rock") {
        const r = o.w / 2;
        // kompakter, leicht unregelmaessiger Block
        px(-r, -r + 2, o.w, o.h - 4, COL.obstacle);
        px(-r + 2, -r, o.w - 4, o.h, COL.obstacle);
        // Gischt-Highlight oben-links
        ctx.globalAlpha = 0.5; px(-r + 3, -r + 1, 3, 2, COL.foam); ctx.globalAlpha = 1;
        // Schatten-Kante unten
        ctx.fillStyle = "rgba(0,0,0,0.22)"; ctx.fillRect(-r + 2, r - 4, o.w - 4, 2);
      } else {
        ctx.rotate(o.rot);
        const w = o.w, h = o.h;
        px(-w / 2, -h / 2, w, h, COL.obstacle);
        // Maserung (abgedunkelt)
        ctx.fillStyle = "rgba(0,0,0,0.22)";
        ctx.fillRect(-w / 2 + 2, -1, w - 4, 1);
        ctx.fillRect(-w / 2 + 4, -h / 2 + 2, w - 8, 1);
        // nasse Kante (Highlight)
        ctx.globalAlpha = 0.4; px(-w / 2 + 1, h / 2 - 2, w - 2, 1, COL.foam); ctx.globalAlpha = 1;
      }
      ctx.restore();
    }

    // Items: Quietsche (Punkt), Schild (Ring), Turbo (Pfeil) — alle pink (Signalfarbe)
    function drawItem(it) {
      const pulse = 1 + 0.12 * Math.sin(it.t * 8);
      ctx.save();
      ctx.translate(Math.round(it.x), Math.round(it.y));
      ctx.scale(pulse, pulse);
      if (it.type === "squeak") {
        // gefuellter Punkt mit Glanz
        px(-4, -3, 8, 6, COL.item);
        px(-3, -4, 6, 8, COL.item);
        ctx.globalAlpha = 0.9; px(-2, -3, 2, 2, COL.foam); ctx.globalAlpha = 1;
      } else if (it.type === "shield") {
        // Seifenblasen-Ring (hohl)
        ctx.strokeStyle = COL.item; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI * 2); ctx.stroke();
        ctx.globalAlpha = 0.8; px(-3, -3, 2, 2, COL.foam); ctx.globalAlpha = 1;
      } else {
        // Turbo: Pfeil nach oben
        px(-1, -5, 2, 10, COL.item);
        px(-4, -2, 3, 2, COL.item);
        px( 1, -2, 3, 2, COL.item);
      }
      ctx.restore();
    }

    // Whirlpool: rotierende Spiral-Ringe im Wasser (Sog-Andeutung)
    function drawWhirl(wp) {
      ctx.save();
      ctx.translate(Math.round(wp.x), Math.round(wp.y));
      ctx.rotate(wp.angle);
      ctx.strokeStyle = COL.waterDeep; ctx.lineWidth = 2;
      ctx.globalAlpha = 0.55;
      for (let k = 1; k <= 3; k++) {
        ctx.beginPath();
        ctx.arc(0, 0, wp.r * 0.32 * k, k * 0.5, k * 0.5 + Math.PI * 1.3);
        ctx.stroke();
      }
      ctx.globalAlpha = 0.7; px(-2, -2, 4, 4, COL.foam); ctx.globalAlpha = 1;
      ctx.restore();
    }

    // Enten-Sprite um den Ursprung (0,0) — wiederverwendbar (Spiel + Start-Screen)
    function drawDuckSprite() {
      // Koerper (gelbes Oval aus Bloecken)
      px(-6, -8, 12, 2, COL.duck);
      px(-8, -6, 16, 4, COL.duck);
      px(-9, -2, 18, 6, COL.duck);
      px(-8,  4, 16, 4, COL.duck);
      px(-6,  8, 12, 2, COL.duck);
      // Kopf
      px(-4, -13, 8, 6, COL.duck);
      px(-3, -15, 6, 2, COL.duck);
      // Schnabel (orange, nach vorn)
      px(-2, -17, 4, 2, COL.beak);
      px(-3, -16, 6, 1, COL.beak);
      // Augen
      px(-3, -12, 1, 1, "#1a1a1a");
      px( 2, -12, 1, 1, "#1a1a1a");
    }

    // Gummiente von oben (top-down): Wasser-Schatten + Power-up-Effekte + Neigung
    function drawDuck() {
      ctx.fillStyle = "rgba(0,0,0,0.16)";
      ctx.beginPath();
      ctx.ellipse(duck.x, duck.y + 7, 11, 5, 0, 0, Math.PI * 2);
      ctx.fill();

      // Turbo: Speed-Linien hinter der Ente (Signalfarbe foam)
      if (duck.turbo > 0) {
        ctx.globalAlpha = 0.5 + 0.3 * Math.sin(duck.turbo * 30);
        for (let k = 0; k < 3; k++) px(duck.x - 6 + k * 5, duck.y + 12 + k * 4, 2, 6, COL.foam);
        ctx.globalAlpha = 1;
      }

      // Ente blinkt waehrend Unverwundbarkeit nach Schild-Treffer
      const blink = duck.invuln > 0 && duck.turbo <= 0 && Math.floor(duck.invuln * 12) % 2 === 0;
      if (!blink) {
        ctx.save();
        ctx.translate(Math.round(duck.x), Math.round(duck.y));
        ctx.rotate(duck.tilt);
        drawDuckSprite();
        ctx.restore();
      }

      // Seifenblasen-Schild: heller Ring um die Ente (Signalfarbe foam + pinker Schimmer)
      if (duck.shield) {
        ctx.globalAlpha = 0.85;
        ctx.strokeStyle = COL.foam; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(duck.x, duck.y - 1, 14, 0, Math.PI * 2); ctx.stroke();
        ctx.globalAlpha = 0.4;
        ctx.strokeStyle = COL.item;
        ctx.beginPath(); ctx.arc(duck.x, duck.y - 1, 14, 0.5, 2.2); ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }

    function drawHUD() {
      ctx.font = "bold 13px 'Trebuchet MS', monospace";
      ctx.textAlign = "left";
      ctx.fillStyle = "#0c2b29";            // Schatten fuer Lesbarkeit
      ctx.fillText(String(score), 7, 17);
      ctx.fillStyle = COL.foam;             // Haupttext
      ctx.fillText(String(score), 6, 16);

      // aktive Power-ups oben rechts
      ctx.textAlign = "right";
      ctx.font = "bold 9px 'Trebuchet MS', monospace";
      let hy = 14;
      if (duck.shield) { ctx.fillStyle = COL.foam; ctx.fillText("SCHILD", W - 6, hy); hy += 11; }
      if (duck.turbo > 0) { ctx.fillStyle = COL.item; ctx.fillText("TURBO", W - 6, hy); }
    }

    function drawStart() {
      // halbtransparentes Panel
      ctx.fillStyle = "rgba(12,43,41,0.55)";
      ctx.fillRect(0, 0, W, H);
      ctx.textAlign = "center";

      ctx.fillStyle = COL.duck;
      ctx.font = "bold 20px 'Trebuchet MS', sans-serif";
      ctx.fillText("RUBBER DUCK", W / 2, 84);
      ctx.fillText("RIVER RUN", W / 2, 108);

      // prominente Hero-Ente, knallgelb ueber dem Panel
      ctx.save();
      ctx.translate(W / 2, 158);
      ctx.scale(1.6, 1.6);
      drawDuckSprite();
      ctx.restore();

      ctx.fillStyle = COL.foam;
      ctx.font = "12px 'Trebuchet MS', sans-serif";
      ctx.fillText("Tipp = Start", W / 2, 212);
      ctx.fillText("Finger ziehen = lenken", W / 2, 230);

      ctx.fillStyle = COL.item;
      ctx.font = "bold 12px 'Trebuchet MS', sans-serif";
      ctx.fillText("Best: " + best, W / 2, 262);
    }

    function drawGameOver() {
      ctx.fillStyle = "rgba(10,30,28,0.72)";
      ctx.fillRect(0, 0, W, H);
      ctx.textAlign = "center";

      ctx.fillStyle = COL.foam;
      ctx.font = "bold 22px 'Trebuchet MS', sans-serif";
      ctx.fillText("GAME OVER", W / 2, 112);

      ctx.fillStyle = COL.duck;
      ctx.font = "bold 30px 'Trebuchet MS', sans-serif";
      ctx.fillText(String(score), W / 2, 158);

      if (newBest) {
        ctx.fillStyle = COL.item;
        ctx.font = "bold 13px 'Trebuchet MS', sans-serif";
        ctx.fillText("NEW BEST!", W / 2, 184);
      } else {
        ctx.fillStyle = COL.foam;
        ctx.font = "12px 'Trebuchet MS', sans-serif";
        ctx.fillText("Best: " + best, W / 2, 184);
      }

      ctx.fillStyle = COL.foam;
      ctx.font = "12px 'Trebuchet MS', sans-serif";
      ctx.fillText("Tipp = nochmal", W / 2, 240);
    }

    function render() {
      drawWater();

      for (const wp of whirls) drawWhirl(wp);
      for (const o of obstacles) drawObstacle(o);
      for (const it of items) drawItem(it);

      // fahrende Ente nur im Spiel / Game-Over (Start zeigt eigene Hero-Ente)
      if (state !== STATE.START) drawDuck();

      if (state === STATE.PLAY) drawHUD();
      if (state === STATE.START) drawStart();
      if (state === STATE.OVER) drawGameOver();
    }

    // ================================================================
    // === GAME-LOOP (requestAnimationFrame + Delta-Time) =============
    // ================================================================
    let last = performance.now();
    function frame(now) {
      const dt = Math.min(0.05, (now - last) / 1000); // clamp gegen Tab-Sprünge
      last = now;
      if (state === STATE.PLAY) update(dt);
      render();
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    // ================================================================
    // === HILFSFUNKTIONEN ============================================
    // ================================================================
    function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

    // Kollision: Kreis (Ente) gegen Rechteck (Hindernis-Hitbox)
    function hitCircleRect(cx, cy, r, rx, ry, rw, rh) {
      const nx = clamp(cx, rx, rx + rw);
      const ny = clamp(cy, ry, ry + rh);
      const dx = cx - nx, dy = cy - ny;
      return dx * dx + dy * dy < r * r;
    }
  })();
  </script>
</body>
</html>
