<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#2A7E78" />
  <title>Rubber Duck River Run</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='13' font-size='13'%3E🦆%3C/text%3E%3C/svg%3E" />
  <style>
    /* === LAYOUT (mobile, portrait, fullscreen) === */
    html, body {
      margin: 0;
      height: 100%;
      background: #0c1413;
      overflow: hidden;
      font-family: "Trebuchet MS", system-ui, sans-serif;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }
    #wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Canvas wird mit nearest-neighbour hochskaliert -> knackige Pixel */
    #c {
      background: #3CAEA3;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.55);
      display: block;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <!-- Interne Auflaesung fix 180x320 (9:16), per CSS hochskaliert -->
    <canvas id="c" width="180" height="320"></canvas>
  </div>

  <script>
  (() => {
    "use strict";

    // ================================================================
    // === KONSTANTEN & PALETTE ("Sunny River") =======================
    // ================================================================
    const W = 180, H = 320;          // logische Pixel-Aufloesung
    const COL = {
      duck:      "#FFD93D",          // Enten-Koerper (Held)
      beak:      "#FF8C42",          // Schnabel / Akzent
      water:     "#3CAEA3",          // Wasser
      waterDeep: "#2A7E78",          // Wasser-Tiefe / Schatten
      foam:      "#E8F6F3",          // Schaum / Highlights
      obstacle:  "#4A3B34",          // Felsen / Holz
      item:      "#FF5DA2",          // Items / Power-ups (Signalfarbe)
    };

    // ================================================================
    // === CANVAS & RESPONSIVE SKALIERUNG =============================
    // ================================================================
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");
    const S = 3;                          // Render-Skalierung -> scharfe Sprites
    canvas.width = W * S;                 // interner Buffer 540x960, Logik bleibt 180x320
    canvas.height = H * S;
    ctx.imageSmoothingEnabled = true;     // glatte gerenderte Sprites

    // Groesste 9:16-Box, die in den Viewport passt (fit width/height)
    function resize() {
      const vw = window.innerWidth, vh = window.innerHeight;
      const scale = Math.min(vw / W, vh / H);
      canvas.style.width  = Math.round(W * scale) + "px";
      canvas.style.height = Math.round(H * scale) + "px";
    }
    window.addEventListener("resize", resize);
    resize();

    // ================================================================
    // === SPIELZUSTAND ===============================================
    // ================================================================
    const STATE = { START: "start", PLAY: "play", OVER: "over" };
    let state = STATE.START;

    let best = +(localStorage.getItem("rdrr_best") || 0);
    let score = 0;
    let dist = 0;            // zurueckgelegte Distanz (treibt Score & Tempo)
    let speed = 0;           // aktuelle Scroll-Geschwindigkeit (px/s)
    let scrollY = 0;         // Versatz fuer Hintergrund-Wellen
    let newBest = false;     // im aktuellen Lauf neuer Rekord erzielt?
    let spawnTimer = 0;      // Countdown bis zum naechsten Hindernis (s)
    let itemTimer = 0;       // Countdown bis zum naechsten Item (s)
    let whirlTimer = 0;      // Countdown bis zum naechsten Whirlpool (s)
    let bonus = 0;           // Bonuspunkte aus eingesammelten Quietschern
    let shakeT = 0;          // Screen-Shake-Restzeit (s)
    let gameOverMsg = "";    // Debugging-Spruch fuer den Game-Over-Screen
    let combo = 0;           // aktuelle Combo (schnelle Pickups/Dodges)
    let comboTimer = 0;      // Restzeit der Combo (s)
    const popups = [];       // Floating-Score-Texte
    let lastPhase = 0;       // aktuelle Tageszeit-Phase
    let phaseFlash = 0;      // Einblend-Timer fuer den Phasen-Namen

    // Tageszeit-Phasen (Farb-Tint ueber die Szene), wechseln mit der Distanz
    const PHASES = [
      { name: "TAG", col: [255, 240, 180], a: 0.0 },
      { name: "SONNENUNTERGANG", col: [255, 110, 50], a: 0.24 },
      { name: "NACHT", col: [18, 26, 80], a: 0.42 },
      { name: "MORGEN", col: [255, 170, 200], a: 0.16 },
    ];
    const PHASE_LEN = 1500;  // Distanz pro Tageszeit-Phase

    // Rubber-Duck-Debugging-Sprueche (Gruss an die Coding-Jury)
    const QUACKS = [
      "Stack Overflow!", "Kernel Quack", "Works on my machine",
      "Segmentation Quack", "NullPointerEnte", "git push --force",
      "Der Bug war die Ente", "404: Ufer not found", "Quack & crash",
    ];

    // Schwierigkeitsstufen: Start-Tempo, Tempo-Anstieg, max. Zusatz-Tempo, Spawn-Intervall
    const DIFFS = {
      easy:   { label: "LEICHT", base: 56, ramp: 0.009, maxAdd: 120, spawnMax: 1.40 },
      normal: { label: "NORMAL", base: 70, ramp: 0.012, maxAdd: 160, spawnMax: 1.15 },
      hard:   { label: "SCHWER", base: 88, ramp: 0.017, maxAdd: 205, spawnMax: 0.92 },
    };
    let diffKey = localStorage.getItem("rdrr_diff") || "normal";

    // Die Ente bleibt vertikal etwa mittig, Welt scrollt an ihr vorbei
    // shield = Seifenblase aktiv, turbo/invuln = Restzeit in Sekunden
    const duck = { x: W / 2, y: H * 0.64, targetX: W / 2, tilt: 0, vx: 0, shield: false, turbo: 0, invuln: 0, mega: 0 };

    // Container fuer Spielobjekte
    const obstacles = [];
    const items = [];          // Quietsche-Collectibles + Power-ups
    const whirls = [];         // Whirlpools (Sog)
    const particles = [];

    // ================================================================
    // === SPRITES (generierte Grafik, mit Pixel-Fallback) ============
    // ================================================================
    const IMG = {};
    const SPRITE_SRC = {
      duck: "assets/duck.png", rock: "assets/rock.png", log: "assets/log.png",
      star: "assets/star.png", shield: "assets/shield.png", turbo: "assets/turbo.png",
      water: "assets/water.jpg",
      whirl: "assets/whirl.png", mega: "assets/mega.png",
      coin: "assets/coin.png", gem: "assets/gem.png",
    };
    for (const k in SPRITE_SRC) { IMG[k] = new Image(); IMG[k].src = SPRITE_SRC[k]; }
    function imgReady(img) { return img && img.complete && img.naturalWidth > 0; }

    // ================================================================
    // === AUDIO (Web Audio API, alles synthetisiert) =================
    // ================================================================
    let audioCtx = null;
    let muted = localStorage.getItem("rdrr_muted") === "1";

    // AudioContext erst bei der ersten Nutzer-Geste erzeugen/fortsetzen
    function initAudio() {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === "suspended") audioCtx.resume();
      } catch (e) { audioCtx = null; }
    }

    // kurzer Ton mit Huellkurve (optionaler Pitch-Bend von freq -> freq2)
    function tone(freq, freq2, dur, type, vol) {
      if (muted || !audioCtx) return;
      const t0 = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t0);
      if (freq2) osc.frequency.exponentialRampToValueAtTime(freq2, t0 + dur);
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.exponentialRampToValueAtTime(vol, t0 + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(t0); osc.stop(t0 + dur + 0.03);
    }

    // Sound-Effekte
    function sfx(kind) {
      if (kind === "squeak") tone(700, 1300, 0.09, "square", 0.16);          // Quietsche
      else if (kind === "coin") tone(900, 1500, 0.07, "square", 0.12);       // Muenze
      else if (kind === "gem") { tone(800, 0, 0.07, "triangle", 0.13); setTimeout(() => tone(1200, 0, 0.09, "triangle", 0.13), 55); setTimeout(() => tone(1650, 0, 0.12, "triangle", 0.13), 120); } // Diamant
      else if (kind === "dodge") tone(480, 720, 0.05, "triangle", 0.07);     // knapp ausgewichen
      else if (kind === "power") { tone(523, 0, 0.08, "square", 0.13); setTimeout(() => tone(784, 0, 0.12, "square", 0.13), 70); } // Schild/Turbo
      else if (kind === "mega") { tone(330, 0, 0.1, "sawtooth", 0.16); setTimeout(() => tone(523, 0, 0.1, "sawtooth", 0.16), 90); setTimeout(() => tone(880, 0, 0.2, "sawtooth", 0.16), 180); } // Riesen-Ente
      else if (kind === "smash") tone(170, 55, 0.12, "sawtooth", 0.17);      // Hindernis zerschmettert
      else if (kind === "start") { tone(500, 0, 0.07, "square", 0.1); setTimeout(() => tone(760, 0, 0.1, "square", 0.1), 75); } // Spielstart
      else if (kind === "over") tone(320, 80, 0.5, "sawtooth", 0.18);        // Game-Over (tief)
    }

    // ================================================================
    // === INPUT (nur Touch / Pointer) ================================
    // ================================================================
    // Bildschirm-Koordinaten in logische Canvas-Koordinaten umrechnen
    function pointerX(e) {
      const r = canvas.getBoundingClientRect();
      return ((e.clientX - r.left) / r.width) * W;
    }
    function pointerY(e) {
      const r = canvas.getBoundingClientRect();
      return ((e.clientY - r.top) / r.height) * H;
    }

    function onDown(e) {
      e.preventDefault();
      initAudio();
      const mx = pointerX(e), my = pointerY(e);
      // Mute-Button oben rechts angetippt?
      if (mx > W - 24 && my < 22) {
        muted = !muted;
        localStorage.setItem("rdrr_muted", muted ? "1" : "0");
        return;
      }
      // Schwierigkeit-Auswahl am Start-Screen?
      if (state === STATE.START && my > 258 && my < 282) {
        diffKey = mx < 62 ? "easy" : mx < 120 ? "normal" : "hard";
        localStorage.setItem("rdrr_diff", diffKey);
        return;
      }
      if (state === STATE.START) { startGame(); }
      else if (state === STATE.OVER) { startGame(); }
      duck.targetX = clamp(mx, 8, W - 8);
    }
    function onMove(e) {
      if (state !== STATE.PLAY) return;
      e.preventDefault();
      duck.targetX = clamp(pointerX(e), 8, W - 8);
    }
    canvas.addEventListener("pointerdown", onDown, { passive: false });
    window.addEventListener("pointermove", onMove, { passive: false });

    // ================================================================
    // === SPIEL-START / RESET ========================================
    // ================================================================
    function startGame() {
      state = STATE.PLAY;
      sfx("start");
      score = 0;
      dist = 0;
      speed = 70;                 // sanfter Start (erste Sekunden leicht)
      duck.x = W / 2;
      duck.targetX = W / 2;
      duck.tilt = 0;
      obstacles.length = 0;
      items.length = 0;
      whirls.length = 0;
      particles.length = 0;
      bonus = 0;
      combo = 0;
      comboTimer = 0;
      popups.length = 0;
      lastPhase = 0;
      phaseFlash = 0;
      duck.shield = false;
      duck.turbo = 0;
      duck.invuln = 0;
      duck.mega = 0;
      duck.vx = 0;
      shakeT = 0;
      newBest = false;
      spawnTimer = 1.4;           // erste ~1,5s bewusst ruhig (fairer Start)
      itemTimer = 2.2;
      whirlTimer = 6.0;           // Whirlpools erst spaeter im Lauf
    }

    // ================================================================
    // === SPAWNING (Hindernisse von oben) ============================
    // ================================================================
    function spawnObstacle() {
      if (Math.random() < 0.55) {
        // Felsen: kompakt, etwas unregelmaessig
        const s = 13 + Math.random() * 11;
        obstacles.push({
          type: "rock", x: 12 + Math.random() * (W - 24), y: -s,
          w: s, h: s, rot: 0, rotSpeed: 0,
        });
      } else {
        // Treibholz: breiter Balken, leichte Drehung
        const w = 26 + Math.random() * 22;   // schmaler -> Holz nicht mehr zu gross
        obstacles.push({
          type: "log", x: w / 2 + Math.random() * (W - w), y: -12,
          w: w, h: w * 0.34, rot: (Math.random() - 0.5) * 0.2,
          rotSpeed: (Math.random() - 0.5) * 0.25,
        });
      }
    }

    // Items: meist Quietsche (Punkte), selten Schild oder Turbo
    function spawnItem() {
      const r = Math.random();
      let type;
      if (r < 0.34) type = "coin";        // haeufig, kleiner Bonus
      else if (r < 0.56) type = "squeak"; // Quietsche-Stern
      else if (r < 0.68) type = "gem";    // selten, grosser Bonus
      else if (r < 0.80) type = "shield";
      else if (r < 0.93) type = "turbo";
      else type = "mega";                 // sehr selten: Riesen-Ente
      items.push({ type, x: 14 + Math.random() * (W - 28), y: -10, t: 0 });
    }

    // Whirlpool: zieht die Ente Richtung Zentrum (nicht toedlich, aber gefaehrlich)
    function spawnWhirl() {
      whirls.push({ x: 24 + Math.random() * (W - 48), y: -30, r: 34, angle: 0 });
    }

    // ================================================================
    // === UPDATE (Logik, Delta-Time in Sekunden) =====================
    // ================================================================
    function update(dt) {
      // Power-up-Timer herunterzaehlen
      if (duck.turbo > 0) duck.turbo -= dt;
      if (duck.invuln > 0) duck.invuln -= dt;
      if (duck.mega > 0) duck.mega -= dt;
      if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) combo = 0; }

      // Tageszeit-Phase wechseln (mit kurzer Namens-Einblendung)
      const ph = Math.floor(dist / PHASE_LEN) % PHASES.length;
      if (ph !== lastPhase) { lastPhase = ph; phaseFlash = 2.0; }
      if (phaseFlash > 0) phaseFlash -= dt;

      // Schwierigkeit: Tempo steigt mit der Distanz (je nach Stufe); Turbo beschleunigt
      const d = DIFFS[diffKey];
      const base = d.base + Math.min(d.maxAdd, dist * d.ramp);
      speed = duck.turbo > 0 ? base * 1.7 : base;
      dist += speed * dt;
      score = Math.floor(dist / 10) + bonus;

      // Ente folgt dem Finger weich (ease), Neigung zeigt Richtung
      const prevX = duck.x;
      duck.x += (duck.targetX - duck.x) * Math.min(1, dt * 12);
      const dx = duck.x - prevX;
      duck.vx = dx;
      duck.tilt += ((clamp(dx * 0.12, -0.35, 0.35)) - duck.tilt) * Math.min(1, dt * 10);

      // Wasser-Textur scrollt nach unten (modulo Textur-Hoehe = W)
      scrollY = (scrollY + speed * dt) % W;

      // Hindernisse spawnen (Rate steigt langsam mit der Distanz)
      spawnTimer -= dt;
      if (spawnTimer <= 0) {
        spawnObstacle();
        spawnTimer = clamp(DIFFS[diffKey].spawnMax - dist * 0.00007, 0.45, DIFFS[diffKey].spawnMax);
      }

      // Hindernisse bewegen, Kollision pruefen, aufraeumen
      for (let i = obstacles.length - 1; i >= 0; i--) {
        const o = obstacles[i];
        o.y += speed * dt;
        o.rot += o.rotSpeed * dt;
        // Kollision (Riesen-Ente zerschmettert, Schild faengt ab, sonst Game-Over)
        const hitR = duck.mega > 0 ? 15 : 7;   // grosse Ente = grosse Hitbox
        if (hitCircleRect(duck.x, duck.y, hitR, o.x - o.w / 2, o.y - o.h / 2, o.w, o.h)) {
          if (duck.mega > 0) {
            // Riesen-Ente smasht das Hindernis weg
            spawnSplash(o.x, o.y, COL.obstacle, 12);
            addScore(5, o.x, o.y - 8, COL.foam);
            sfx("smash");
            shakeT = Math.max(shakeT, 0.12);
            obstacles.splice(i, 1);
            continue;
          }
          if (duck.invuln > 0) {
            // unverwundbar (Turbo / kurz nach Schild) -> einfach durchgleiten
          } else if (duck.shield) {
            // Seifenblase faengt einen Treffer ab und platzt
            duck.shield = false;
            duck.invuln = 0.8;
            spawnSplash(duck.x, duck.y, COL.foam, 14);
            sfx("dodge");
            obstacles.splice(i, 1);
            continue;
          } else {
            gameOver();
            return;
          }
        }
        // knapp ausgewichen? -> Dodge-Sound + kleiner Spritzer (einmal pro Hindernis)
        if (!o.passed && o.y > duck.y && Math.abs(o.x - duck.x) < o.w / 2 + 13) {
          o.passed = true;
          combo++; comboTimer = 2.0;
          sfx("dodge");
          spawnSplash(duck.x, duck.y - 4, COL.foam, 4);
        }
        if (o.y - o.h > H + 20) obstacles.splice(i, 1);
      }

      // Items bewegen + einsammeln
      for (let i = items.length - 1; i >= 0; i--) {
        const it = items[i];
        it.y += speed * dt;
        it.t += dt;
        if (hitCircleRect(duck.x, duck.y, 9, it.x - 6, it.y - 6, 12, 12)) {
          collectItem(it.type);
          items.splice(i, 1);
          continue;
        }
        if (it.y - 10 > H + 20) items.splice(i, 1);
      }

      // Whirlpools bewegen + Sog auf die Ente ausueben
      for (let i = whirls.length - 1; i >= 0; i--) {
        const wp = whirls[i];
        wp.y += speed * dt;
        wp.angle += dt * 2.5;
        const wx = wp.x - duck.x, wy = wp.y - duck.y;
        const d = Math.hypot(wx, wy);
        if (d < wp.r && d > 0.1) {
          const pull = (1 - d / wp.r) * 70 * dt;   // Sog staerker je naeher am Zentrum
          duck.x = clamp(duck.x + (wx / d) * pull, 8, W - 8);
        }
        if (wp.y - wp.r > H + 20) whirls.splice(i, 1);
      }

      // Item- und Whirlpool-Spawner
      itemTimer -= dt;
      if (itemTimer <= 0) { spawnItem(); itemTimer = 1.6 + Math.random() * 1.8; }
      whirlTimer -= dt;
      if (whirlTimer <= 0) { spawnWhirl(); whirlTimer = clamp(7 - dist * 0.0001, 3.5, 7) + Math.random() * 2; }
    }

    // Effekt beim Einsammeln eines Items
    function collectItem(type) {
      const ix = duck.x, iy = duck.y - 12;
      if (type === "coin") { addScore(8, ix, iy, "#FFD93D"); sfx("coin"); spawnSplash(duck.x, duck.y, "#FFD93D", 7); }
      else if (type === "squeak") { addScore(15, ix, iy, COL.item); sfx("squeak"); spawnSplash(duck.x, duck.y, COL.item, 8); }
      else if (type === "gem") { addScore(40, ix, iy, "#8fe9e2"); sfx("gem"); spawnSplash(duck.x, duck.y, "#8fe9e2", 12); }
      else if (type === "shield") { duck.shield = true; combo++; comboTimer = 2.0; sfx("power"); spawnSplash(duck.x, duck.y, COL.item, 12); }
      else if (type === "turbo") { duck.turbo = 3.2; duck.invuln = 3.2; combo++; comboTimer = 2.0; sfx("power"); spawnSplash(duck.x, duck.y, COL.item, 12); }
      else if (type === "mega") { duck.mega = 5.5; duck.invuln = 5.5; sfx("mega"); shakeT = 0.3; spawnSplash(duck.x, duck.y, "#FFD93D", 18); }
    }

    // Spritz-Partikel erzeugen (radial)
    function spawnSplash(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const sp = 20 + Math.random() * 60;
        particles.push({
          x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
          life: 0.3 + Math.random() * 0.3, max: 0.6, color, size: 1 + Math.random() * 2,
        });
      }
    }

    // Partikel bewegen + ausklingen (laeuft in jedem State weiter)
    function updateParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt; p.y += p.vy * dt;
        p.vx *= 0.92; p.vy *= 0.92;       // Reibung
        p.life -= dt;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    // Combo-Multiplikator aus der aktuellen Combo
    function comboMult() { return combo < 3 ? 1 : combo < 6 ? 2 : combo < 10 ? 3 : 4; }

    // Punkte gutschreiben (x Combo) + Floating-Popup + Combo erhoehen
    function addScore(pts, x, y, color) {
      const total = pts * comboMult();
      bonus += total;
      combo++;
      comboTimer = 2.0;
      popups.push({ x, y, life: 0.9, text: "+" + total, color: color || COL.foam });
    }

    // Popups aufsteigen lassen + ausblenden
    function updatePopups(dt) {
      for (let i = popups.length - 1; i >= 0; i--) {
        popups[i].y -= dt * 22;
        popups[i].life -= dt;
        if (popups[i].life <= 0) popups.splice(i, 1);
      }
    }

    // ================================================================
    // === GAME-OVER ==================================================
    // ================================================================
    function gameOver() {
      state = STATE.OVER;
      sfx("over");
      if (navigator.vibrate) navigator.vibrate(120);
      shakeT = 0.4;
      spawnSplash(duck.x, duck.y, COL.foam, 16);
      gameOverMsg = QUACKS[Math.floor(Math.random() * QUACKS.length)];
      newBest = score > best;
      if (newBest) {
        best = score;
        localStorage.setItem("rdrr_best", String(best));
      }
    }

    // ================================================================
    // === RENDER =====================================================
    // ================================================================
    function drawWater() {
      if (imgReady(IMG.water)) {
        // gekachelte, vertikal scrollende Wasser-Textur
        const th = W;   // 1:1-Textur auf Canvas-Breite skaliert
        for (let y = (scrollY % th) - th; y < H; y += th) {
          ctx.drawImage(IMG.water, 0, Math.round(y), W, th);
        }
      } else {
        ctx.fillStyle = COL.water;
        ctx.fillRect(0, 0, W, H);
      }
    }

    // Pixel-Helfer
    function px(x, y, w, h, color) { ctx.fillStyle = color; ctx.fillRect(x, y, w, h); }

    // Felsen / Treibholz — generiertes Sprite (Fallback: Pixel-Block)
    function drawObstacle(o) {
      const img = o.type === "rock" ? IMG.rock : IMG.log;
      if (imgReady(img)) {
        ctx.save();
        ctx.translate(o.x, o.y);
        ctx.rotate(o.rot);
        const s = o.w * (o.type === "rock" ? 1.35 : 1.18);   // Holz weniger aufblasen
        ctx.drawImage(img, -s / 2, -s / 2, s, s);
        ctx.restore();
        return;
      }
      // Fallback: Pixel-Block
      ctx.save();
      ctx.translate(Math.round(o.x), Math.round(o.y));
      if (o.type === "rock") {
        const r = o.w / 2;
        px(-r, -r + 2, o.w, o.h - 4, COL.obstacle);
        px(-r + 2, -r, o.w - 4, o.h, COL.obstacle);
        ctx.globalAlpha = 0.5; px(-r + 3, -r + 1, 3, 2, COL.foam); ctx.globalAlpha = 1;
        ctx.fillStyle = "rgba(0,0,0,0.22)"; ctx.fillRect(-r + 2, r - 4, o.w - 4, 2);
      } else {
        ctx.rotate(o.rot);
        const w = o.w, h = o.h;
        px(-w / 2, -h / 2, w, h, COL.obstacle);
        ctx.fillStyle = "rgba(0,0,0,0.22)";
        ctx.fillRect(-w / 2 + 2, -1, w - 4, 1);
        ctx.fillRect(-w / 2 + 4, -h / 2 + 2, w - 8, 1);
        ctx.globalAlpha = 0.4; px(-w / 2 + 1, h / 2 - 2, w - 2, 1, COL.foam); ctx.globalAlpha = 1;
      }
      ctx.restore();
    }

    // Items — generiertes Sprite, leicht pulsierend (Fallback: Pixel-Icon)
    function drawItem(it) {
      const pulse = 1 + 0.12 * Math.sin(it.t * 8);
      const img = it.type === "squeak" ? IMG.star
        : it.type === "shield" ? IMG.shield
        : it.type === "turbo" ? IMG.turbo
        : it.type === "coin" ? IMG.coin
        : it.type === "gem" ? IMG.gem
        : IMG.mega;
      if (imgReady(img)) {
        const s = (it.type === "mega" ? 24 : 18) * pulse;   // Mega-Item groesser
        ctx.drawImage(img, it.x - s / 2, it.y - s / 2, s, s);
        return;
      }
      // Fallback: Pixel-Punkt (greift nur, falls ein Asset nicht laedt)
      ctx.save();
      ctx.translate(Math.round(it.x), Math.round(it.y));
      ctx.scale(pulse, pulse);
      px(-4, -3, 8, 6, COL.item);
      px(-3, -4, 6, 8, COL.item);
      ctx.globalAlpha = 0.9; px(-2, -3, 2, 2, COL.foam); ctx.globalAlpha = 1;
      ctx.restore();
    }

    // Whirlpool: rotierende Spiral-Ringe im Wasser (Sog-Andeutung)
    function drawWhirl(wp) {
      ctx.save();
      ctx.translate(Math.round(wp.x), Math.round(wp.y));
      ctx.rotate(wp.angle);
      if (imgReady(IMG.whirl)) {
        const s = wp.r * 2.15;
        ctx.globalAlpha = 0.92;
        ctx.drawImage(IMG.whirl, -s / 2, -s / 2, s, s);
        ctx.globalAlpha = 1;
      } else {
        ctx.strokeStyle = COL.waterDeep; ctx.lineWidth = 2;
        ctx.globalAlpha = 0.55;
        for (let k = 1; k <= 3; k++) {
          ctx.beginPath();
          ctx.arc(0, 0, wp.r * 0.32 * k, k * 0.5, k * 0.5 + Math.PI * 1.3);
          ctx.stroke();
        }
        ctx.globalAlpha = 0.7; px(-2, -2, 4, 4, COL.foam); ctx.globalAlpha = 1;
      }
      ctx.restore();
    }

    // Spritz-Partikel zeichnen (blenden mit der Restlebenszeit aus)
    function drawParticles() {
      for (const p of particles) {
        ctx.globalAlpha = clamp(p.life / p.max, 0, 1);
        px(Math.round(p.x), Math.round(p.y), p.size, p.size, p.color);
      }
      ctx.globalAlpha = 1;
    }

    // Floating-Score-Popups (+8, +40, ...)
    function drawPopups() {
      ctx.textAlign = "center";
      ctx.font = "bold 10px 'Trebuchet MS', sans-serif";
      for (const p of popups) {
        ctx.globalAlpha = clamp(p.life / 0.9, 0, 1);
        ctx.fillStyle = p.color;
        ctx.fillText(p.text, Math.round(p.x), Math.round(p.y));
      }
      ctx.globalAlpha = 1;
    }

    // Tageszeit-Tint ueber die Szene (sanfter Uebergang zwischen Phasen)
    function drawTint() {
      const f = dist / PHASE_LEN;
      const i = Math.floor(f) % PHASES.length;
      const j = (i + 1) % PHASES.length;
      const t = f - Math.floor(f);
      const A = PHASES[i], B = PHASES[j];
      const a = lerp(A.a, B.a, t);
      if (a < 0.01) return;
      const r = lerp(A.col[0], B.col[0], t) | 0;
      const g = lerp(A.col[1], B.col[1], t) | 0;
      const b = lerp(A.col[2], B.col[2], t) | 0;
      ctx.globalAlpha = a;
      ctx.fillStyle = "rgb(" + r + "," + g + "," + b + ")";
      ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 1;
    }

    // Enten-Sprite um den Ursprung (0,0) — wiederverwendbar (Spiel + Start-Screen)
    function drawDuckSprite() {
      if (imgReady(IMG.duck)) {
        const s = 40;   // generiertes Enten-Sprite (etwas groesser wegen transparentem Rand)
        ctx.drawImage(IMG.duck, -s / 2, -s / 2, s, s);
        return;
      }
      // Fallback: Pixel-Ente
      px(-6, -8, 12, 2, COL.duck);
      px(-8, -6, 16, 4, COL.duck);
      px(-9, -2, 18, 6, COL.duck);
      px(-8,  4, 16, 4, COL.duck);
      px(-6,  8, 12, 2, COL.duck);
      // Kopf
      px(-4, -13, 8, 6, COL.duck);
      px(-3, -15, 6, 2, COL.duck);
      // Schnabel (orange, nach vorn)
      px(-2, -17, 4, 2, COL.beak);
      px(-3, -16, 6, 1, COL.beak);
      // Augen
      px(-3, -12, 1, 1, "#1a1a1a");
      px( 2, -12, 1, 1, "#1a1a1a");
    }

    // Gummiente von oben (top-down): Wasser-Schatten + Power-up-Effekte + Neigung
    function drawDuck() {
      ctx.fillStyle = "rgba(0,0,0,0.16)";
      ctx.beginPath();
      ctx.ellipse(duck.x, duck.y + 7, 11, 5, 0, 0, Math.PI * 2);
      ctx.fill();

      // Turbo: Speed-Linien hinter der Ente (Signalfarbe foam)
      if (duck.turbo > 0) {
        ctx.globalAlpha = 0.5 + 0.3 * Math.sin(duck.turbo * 30);
        for (let k = 0; k < 3; k++) px(duck.x - 6 + k * 5, duck.y + 12 + k * 4, 2, 6, COL.foam);
        ctx.globalAlpha = 1;
      }

      // goldene Aura waehrend der Riesen-Ente
      if (duck.mega > 0) {
        ctx.globalAlpha = 0.35 + 0.2 * Math.sin(duck.mega * 18);
        ctx.fillStyle = COL.duck;
        ctx.beginPath(); ctx.arc(duck.x, duck.y, 23, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
      }

      // Ente blinkt waehrend Unverwundbarkeit nach Schild-Treffer (nicht bei Mega)
      const blink = duck.invuln > 0 && duck.turbo <= 0 && duck.mega <= 0 && Math.floor(duck.invuln * 12) % 2 === 0;
      if (!blink) {
        // Gummi-Squash + Riesen-Skalierung bei Mega
        const sq = clamp(Math.abs(duck.vx) * 0.05, 0, 0.28);
        const ms = duck.mega > 0 ? 1.7 : 1;
        ctx.save();
        ctx.translate(Math.round(duck.x), Math.round(duck.y));
        ctx.rotate(duck.tilt);
        ctx.scale((1 + sq) * ms, (1 - sq * 0.7) * ms);
        drawDuckSprite();
        ctx.restore();
      }

      // Seifenblasen-Schild: heller Ring um die Ente (Signalfarbe foam + pinker Schimmer)
      if (duck.shield) {
        ctx.globalAlpha = 0.85;
        ctx.strokeStyle = COL.foam; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(duck.x, duck.y - 1, 14, 0, Math.PI * 2); ctx.stroke();
        ctx.globalAlpha = 0.4;
        ctx.strokeStyle = COL.item;
        ctx.beginPath(); ctx.arc(duck.x, duck.y - 1, 14, 0.5, 2.2); ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }

    function drawHUD() {
      ctx.font = "bold 13px 'Trebuchet MS', monospace";
      ctx.textAlign = "left";
      ctx.fillStyle = "#0c2b29";            // Schatten fuer Lesbarkeit
      ctx.fillText(String(score), 7, 17);
      ctx.fillStyle = COL.foam;             // Haupttext
      ctx.fillText(String(score), 6, 16);

      // Combo-Anzeige (ab x2)
      if (combo >= 3) {
        ctx.fillStyle = COL.item;
        ctx.font = "bold 11px 'Trebuchet MS', monospace";
        ctx.fillText("COMBO x" + comboMult(), 6, 31);
      }

      // aktive Power-ups oben rechts (unter dem Mute-Button)
      ctx.textAlign = "right";
      ctx.font = "bold 9px 'Trebuchet MS', monospace";
      let hy = 32;
      if (duck.shield) { ctx.fillStyle = COL.foam; ctx.fillText("SCHILD", W - 6, hy); hy += 11; }
      if (duck.turbo > 0) { ctx.fillStyle = COL.item; ctx.fillText("TURBO", W - 6, hy); }

      // Phasen-Name beim Wechsel kurz einblenden
      if (phaseFlash > 0) {
        ctx.globalAlpha = clamp(phaseFlash, 0, 1);
        ctx.fillStyle = COL.foam;
        ctx.textAlign = "center";
        ctx.font = "bold 13px 'Trebuchet MS', sans-serif";
        ctx.fillText(PHASES[lastPhase].name, W / 2, 52);
        ctx.globalAlpha = 1;
      }
    }

    function drawStart() {
      // halbtransparentes Panel
      ctx.fillStyle = "rgba(12,43,41,0.55)";
      ctx.fillRect(0, 0, W, H);
      ctx.textAlign = "center";

      ctx.fillStyle = COL.duck;
      ctx.font = "bold 20px 'Trebuchet MS', sans-serif";
      ctx.fillText("RUBBER DUCK", W / 2, 78);
      ctx.fillText("RIVER RUN", W / 2, 102);

      ctx.fillStyle = COL.foam;
      ctx.globalAlpha = 0.7;
      ctx.font = "italic 9px 'Trebuchet MS', sans-serif";
      ctx.fillText("Rubber-Duck-Debugging als Sport", W / 2, 118);
      ctx.globalAlpha = 1;

      // prominente Hero-Ente ueber dem Panel
      ctx.save();
      ctx.translate(W / 2, 150);
      ctx.scale(1.5, 1.5);
      drawDuckSprite();
      ctx.restore();

      ctx.fillStyle = COL.foam;
      ctx.font = "12px 'Trebuchet MS', sans-serif";
      ctx.fillText("Tipp = Start", W / 2, 190);
      ctx.fillText("Finger ziehen = lenken", W / 2, 206);

      ctx.fillStyle = COL.item;
      ctx.font = "bold 11px 'Trebuchet MS', sans-serif";
      ctx.fillText("Best: " + best, W / 2, 228);

      // Schwierigkeit-Auswahl (antippbare Pillen)
      ctx.fillStyle = COL.foam; ctx.globalAlpha = 0.7;
      ctx.font = "9px 'Trebuchet MS', sans-serif";
      ctx.fillText("Schwierigkeit", W / 2, 250);
      ctx.globalAlpha = 1;
      const dkeys = ["easy", "normal", "hard"];
      const dcx = [33, 90, 147];
      ctx.font = "bold 9px 'Trebuchet MS', sans-serif";
      for (let i = 0; i < 3; i++) {
        const sel = dkeys[i] === diffKey;
        ctx.fillStyle = sel ? COL.item : "rgba(232,246,243,0.18)";
        ctx.beginPath(); ctx.roundRect(dcx[i] - 25, 262, 50, 16, 8); ctx.fill();
        ctx.fillStyle = sel ? "#0c2b29" : COL.foam;
        ctx.fillText(DIFFS[dkeys[i]].label, dcx[i], 273);
      }
    }

    function drawGameOver() {
      ctx.fillStyle = "rgba(10,30,28,0.72)";
      ctx.fillRect(0, 0, W, H);
      ctx.textAlign = "center";

      ctx.fillStyle = COL.foam;
      ctx.font = "bold 22px 'Trebuchet MS', sans-serif";
      ctx.fillText("GAME OVER", W / 2, 112);

      ctx.fillStyle = COL.duck;
      ctx.font = "bold 30px 'Trebuchet MS', sans-serif";
      ctx.fillText(String(score), W / 2, 158);

      if (newBest) {
        ctx.fillStyle = COL.item;
        ctx.font = "bold 13px 'Trebuchet MS', sans-serif";
        ctx.fillText("NEW BEST!", W / 2, 184);
      } else {
        ctx.fillStyle = COL.foam;
        ctx.font = "12px 'Trebuchet MS', sans-serif";
        ctx.fillText("Best: " + best, W / 2, 184);
      }

      // Rubber-Duck-Debugging-Spruch (Gruss an die Jury)
      ctx.fillStyle = COL.beak;
      ctx.font = "italic bold 11px 'Trebuchet MS', sans-serif";
      ctx.fillText('"' + gameOverMsg + '"', W / 2, 212);

      ctx.fillStyle = COL.foam;
      ctx.font = "12px 'Trebuchet MS', sans-serif";
      ctx.fillText("Tipp = nochmal", W / 2, 240);
    }

    // Mute-Button oben rechts: glatter Lautsprecher + Schallwellen (an) bzw. pinkes X (stumm)
    function drawMuteButton() {
      const cx = W - 15, cy = 12;
      ctx.save();
      ctx.globalAlpha = 0.95;
      ctx.lineJoin = "round";
      ctx.lineCap = "round";
      // Lautsprecher-Korpus (Box + Konus) als gefuellter Pfad
      ctx.fillStyle = COL.foam;
      ctx.beginPath();
      ctx.moveTo(cx - 7, cy - 2.5);
      ctx.lineTo(cx - 3.5, cy - 2.5);
      ctx.lineTo(cx + 0.5, cy - 6);
      ctx.lineTo(cx + 0.5, cy + 6);
      ctx.lineTo(cx - 3.5, cy + 2.5);
      ctx.lineTo(cx - 7, cy + 2.5);
      ctx.closePath();
      ctx.fill();
      if (muted) {
        // klares pinkes X
        ctx.strokeStyle = COL.item; ctx.lineWidth = 1.8;
        ctx.beginPath();
        ctx.moveTo(cx + 4, cy - 4); ctx.lineTo(cx + 9, cy + 4);
        ctx.moveTo(cx + 9, cy - 4); ctx.lineTo(cx + 4, cy + 4);
        ctx.stroke();
      } else {
        // zwei Schallwellen-Boegen
        ctx.strokeStyle = COL.foam; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(cx + 1, cy, 4.5, -0.7, 0.7); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx + 1, cy, 7.5, -0.7, 0.7); ctx.stroke();
      }
      ctx.restore();
    }

    function render() {
      ctx.setTransform(S, 0, 0, S, 0, 0);   // Basis: 180x320-Logik, scharf hochskaliert
      ctx.save();
      // Screen-Shake bei Aufprall (klingt aus)
      if (shakeT > 0) {
        const s = 6 * (shakeT / 0.4);
        ctx.translate((Math.random() - 0.5) * s, (Math.random() - 0.5) * s);
      }

      drawWater();
      for (const wp of whirls) drawWhirl(wp);
      for (const o of obstacles) drawObstacle(o);
      for (const it of items) drawItem(it);
      // fahrende Ente nur im Spiel / Game-Over (Start zeigt eigene Hero-Ente)
      if (state !== STATE.START) drawDuck();
      drawParticles();
      drawPopups();
      drawTint();
      ctx.restore();

      // HUD & Overlays ohne Shake (bleiben ruhig lesbar)
      if (state === STATE.PLAY) drawHUD();
      if (state === STATE.START) drawStart();
      if (state === STATE.OVER) drawGameOver();
      drawMuteButton();   // immer sichtbar (alle States)
    }

    // ================================================================
    // === GAME-LOOP (requestAnimationFrame + Delta-Time) =============
    // ================================================================
    let last = performance.now();
    function frame(now) {
      const dt = Math.min(0.05, (now - last) / 1000); // clamp gegen Tab-Sprünge
      last = now;
      if (state === STATE.PLAY) update(dt);
      if (shakeT > 0) shakeT -= dt;     // Shake klingt auch im Game-Over aus
      updateParticles(dt);              // Partikel laufen in jedem State weiter
      updatePopups(dt);
      render();
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    // ================================================================
    // === HILFSFUNKTIONEN ============================================
    // ================================================================
    function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }
    function lerp(a, b, t) { return a + (b - a) * t; }

    // Kollision: Kreis (Ente) gegen Rechteck (Hindernis-Hitbox)
    function hitCircleRect(cx, cy, r, rx, ry, rw, rh) {
      const nx = clamp(cx, rx, rx + rw);
      const ny = clamp(cy, ry, ry + rh);
      const dx = cx - nx, dy = cy - ny;
      return dx * dx + dy * dy < r * r;
    }
  })();
  </script>
</body>
