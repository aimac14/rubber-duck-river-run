<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#2A7E78" />
  <title>Rubber Duck River Run</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='13' font-size='13'%3E🦆%3C/text%3E%3C/svg%3E" />
  <style>
    /* === LAYOUT (mobile, portrait, fullscreen) === */
    html, body {
      margin: 0;
      height: 100%;
      background: #0c1413;
      overflow: hidden;
      font-family: "Trebuchet MS", system-ui, sans-serif;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }
    #wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Canvas wird mit nearest-neighbour hochskaliert -> knackige Pixel */
    #c {
      background: #3CAEA3;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.55);
      display: block;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <!-- Interne Auflaesung fix 180x320 (9:16), per CSS hochskaliert -->
    <canvas id="c" width="180" height="320"></canvas>
  </div>

  <script>
  (() => {
    "use strict";

    // ================================================================
    // === KONSTANTEN & PALETTE ("Sunny River") =======================
    // ================================================================
    const W = 180, H = 320;          // logische Pixel-Aufloesung
    const COL = {
      duck:      "#FFD93D",          // Enten-Koerper (Held)
      beak:      "#FF8C42",          // Schnabel / Akzent
      water:     "#3CAEA3",          // Wasser
      waterDeep: "#2A7E78",          // Wasser-Tiefe / Schatten
      foam:      "#E8F6F3",          // Schaum / Highlights
      obstacle:  "#4A3B34",          // Felsen / Holz
      item:      "#FF5DA2",          // Items / Power-ups (Signalfarbe)
    };

    // ================================================================
    // === CANVAS & RESPONSIVE SKALIERUNG =============================
    // ================================================================
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");
    const S = 3;                          // Render-Skalierung -> scharfe Sprites
    canvas.width = W * S;                 // interner Buffer 540x960, Logik bleibt 180x320
    canvas.height = H * S;
    ctx.imageSmoothingEnabled = true;     // glatte gerenderte Sprites

    // Groesste 9:16-Box, die in den Viewport passt (fit width/height)
    function resize() {
      const vw = window.innerWidth, vh = window.innerHeight;
      const scale = Math.min(vw / W, vh / H);
      canvas.style.width  = Math.round(W * scale) + "px";
      canvas.style.height = Math.round(H * scale) + "px";
    }
    window.addEventListener("resize", resize);
    resize();

    // ================================================================
    // === SPIELZUSTAND ===============================================
    // ================================================================
    const STATE = { START: "start", PLAY: "play", OVER: "over" };
    let state = STATE.START;

    let best = +(localStorage.getItem("rdrr_best") || 0);
    let score = 0;
    let dist = 0;            // zurueckgelegte Distanz (treibt Score & Tempo)
    let speed = 0;           // aktuelle Scroll-Geschwindigkeit (px/s)
    let scrollY = 0;         // Versatz fuer Hintergrund-Wellen
    let newBest = false;     // im aktuellen Lauf neuer Rekord erzielt?
    let spawnTimer = 0;      // Countdown bis zum naechsten Hindernis (s)
    let itemTimer = 0;       // Countdown bis zum naechsten Item (s)
    let whirlTimer = 0;      // Countdown bis zum naechsten Whirlpool (s)
    let bonus = 0;           // Bonuspunkte aus eingesammelten Quietschern
    let shakeT = 0;          // Screen-Shake-Restzeit (s)
    let gameOverMsg = "";    // Debugging-Spruch fuer den Game-Over-Screen

    // Rubber-Duck-Debugging-Sprueche (Gruss an die Coding-Jury)
    const QUACKS = [
      "Stack Overflow!", "Kernel Quack", "Works on my machine",
      "Segmentation Quack", "NullPointerEnte", "git push --force",
      "Der Bug war die Ente", "404: Ufer not found", "Quack & crash",
    ];

    // Die Ente bleibt vertikal etwa mittig, Welt scrollt an ihr vorbei
    // shield = Seifenblase aktiv, turbo/invuln = Restzeit in Sekunden
    const duck = { x: W / 2, y: H * 0.64, targetX: W / 2, tilt: 0, vx: 0, shield: false, turbo: 0, invuln: 0 };

    // Container fuer Spielobjekte
    const obstacles = [];
    const items = [];          // Quietsche-Collectibles + Power-ups
    const whirls = [];         // Whirlpools (Sog)
    const particles = [];

    // Schaum-Streifen fuer die Wasser-Animation
    let foam = [];
    function initFoam() {
      foam = [];
      for (let i = 0; i < 14; i++) {
        foam.push({
          x: Math.random() * W,
          y: Math.random() * H,
          w: 6 + Math.random() * 14,
          deep: Math.random() < 0.4,   // dunklere Tiefe-Streifen
        });
      }
    }
    initFoam();

    // ================================================================
    // === SPRITES (generierte Grafik, mit Pixel-Fallback) ============
    // ================================================================
    const IMG = {};
    const SPRITE_SRC = {
      duck: "assets/duck.png", rock: "assets/rock.png", log: "assets/log.png",
      star: "assets/star.png", shield: "assets/shield.png", turbo: "assets/turbo.png",
      water: "assets/water.jpg",
    };
    for (const k in SPRITE_SRC) { IMG[k] = new Image(); IMG[k].src = SPRITE_SRC[k]; }
    function imgReady(img) { return img && img.complete && img.naturalWidth > 0; }

    // ================================================================
    // === AUDIO (Web Audio API, alles synthetisiert) =================
    // ================================================================
    let audioCtx = null;
    let muted = localStorage.getItem("rdrr_muted") === "1";

    // AudioContext erst bei der ersten Nutzer-Geste erzeugen/fortsetzen
    function initAudio() {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === "suspended") audioCtx.resume();
      } catch (e) { audioCtx = null; }
    }

    // kurzer Ton mit Huellkurve (optionaler Pitch-Bend von freq -> freq2)
    function tone(freq, freq2, dur, type, vol) {
      if (muted || !audioCtx) return;
      const t0 = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t0);
      if (freq2) osc.frequency.exponentialRampToValueAtTime(freq2, t0 + dur);
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.exponentialRampToValueAtTime(vol, t0 + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(t0); osc.stop(t0 + dur + 0.03);
    }

    // Sound-Effekte
    function sfx(kind) {
      if (kind === "squeak") tone(700, 1300, 0.09, "square", 0.16);          // Quietsche eingesammelt
      else if (kind === "dodge") tone(480, 720, 0.05, "triangle", 0.07);     // knapp ausgewichen
      else if (kind === "power") { tone(523, 0, 0.08, "square", 0.13); setTimeout(() => tone(784, 0, 0.12, "square", 0.13), 70); } // Power-up
      else if (kind === "over") tone(320, 80, 0.5, "sawtooth", 0.18);        // Game-Over (tief)
    }

    // ================================================================
    // === INPUT (nur Touch / Pointer) ================================
    // ================================================================
    // Bildschirm-Koordinaten in logische Canvas-Koordinaten umrechnen
    function pointerX(e) {
      const r = canvas.getBoundingClientRect();
      return ((e.clientX - r.left) / r.width) * W;
    }
    function pointerY(e) {
      const r = canvas.getBoundingClientRect();
      return ((e.clientY - r.top) / r.height) * H;
    }

    function onDown(e) {
      e.preventDefault();
      initAudio();
      // Mute-Button oben rechts angetippt?
      if (pointerX(e) > W - 24 && pointerY(e) < 22) {
        muted = !muted;
        localStorage.setItem("rdrr_muted", muted ? "1" : "0");
        return;
      }
      if (state === STATE.START) { startGame(); }
      else if (state === STATE.OVER) { startGame(); }
      duck.targetX = clamp(pointerX(e), 8, W - 8);
    }
    function onMove(e) {
      if (state !== STATE.PLAY) return;
      e.preventDefault();
      duck.targetX = clamp(pointerX(e), 8, W - 8);
    }
    canvas.addEventListener("pointerdown", onDown, { passive: false });
    window.addEventListener("pointermove", onMove, { passive: false });

    // ================================================================
    // === SPIEL-START / RESET ========================================
    // ================================================================
    function startGame() {
      state = STATE.PLAY;
      score = 0;
      dist = 0;
      speed = 70;                 // sanfter Start (erste Sekunden leicht)
      duck.x = W / 2;
      duck.targetX = W / 2;
      duck.tilt = 0;
      obstacles.length = 0;
      items.length = 0;
      whirls.length = 0;
      particles.length = 0;
      bonus = 0;
      duck.shield = false;
      duck.turbo = 0;
      duck.invuln = 0;
      duck.vx = 0;
      shakeT = 0;
      newBest = false;
      spawnTimer = 1.4;           // erste ~1,5s bewusst ruhig (fairer Start)
      itemTimer = 2.2;
      whirlTimer = 6.0;           // Whirlpools erst spaeter im Lauf
    }

    // ================================================================
    // === SPAWNING (Hindernisse von oben) ============================
    // ================================================================
    function spawnObstacle() {
      if (Math.random() < 0.55) {
        // Felsen: kompakt, etwas unregelmaessig
        const s = 13 + Math.random() * 11;
        obstacles.push({
          type: "rock", x: 12 + Math.random() * (W - 24), y: -s,
          w: s, h: s, rot: 0, rotSpeed: 0,
        });
      } else {
        // Treibholz: breiter Balken, leichte Drehung
        const w = 26 + Math.random() * 22;   // schmaler -> Holz nicht mehr zu gross
        obstacles.push({
          type: "log", x: w / 2 + Math.random() * (W - w), y: -12,
          w: w, h: w * 0.34, rot: (Math.random() - 0.5) * 0.2,
          rotSpeed: (Math.random() - 0.5) * 0.25,
        });
      }
    }

    // Items: meist Quietsche (Punkte), selten Schild oder Turbo
    function spawnItem() {
      const r = Math.random();
      const type = r < 0.72 ? "squeak" : r < 0.86 ? "shield" : "turbo";
      items.push({ type, x: 14 + Math.random() * (W - 28), y: -10, t: 0 });
    }

    // Whirlpool: zieht die Ente Richtung Zentrum (nicht toedlich, aber gefaehrlich)
    function spawnWhirl() {
      whirls.push({ x: 24 + Math.random() * (W - 48), y: -30, r: 34, angle: 0 });
    }

    // ================================================================
    // === UPDATE (Logik, Delta-Time in Sekunden) =====================
    // ================================================================
    function update(dt) {
      // Power-up-Timer herunterzaehlen
      if (duck.turbo > 0) duck.turbo -= dt;
      if (duck.invuln > 0) duck.invuln -= dt;

      // Schwierigkeit: Tempo steigt langsam mit der Distanz; Turbo beschleunigt
      const base = 70 + Math.min(160, dist * 0.012);
      speed = duck.turbo > 0 ? base * 1.7 : base;
      dist += speed * dt;
      score = Math.floor(dist / 10) + bonus;

      // Ente folgt dem Finger weich (ease), Neigung zeigt Richtung
      const prevX = duck.x;
      duck.x += (duck.targetX - duck.x) * Math.min(1, dt * 12);
      const dx = duck.x - prevX;
      duck.vx = dx;
      duck.tilt += ((clamp(dx * 0.12, -0.35, 0.35)) - duck.tilt) * Math.min(1, dt * 10);

      // Wasser-Animation scrollt nach unten (modulo Textur-Hoehe = W)
      scrollY = (scrollY + speed * dt) % W;
      for (const f of foam) {
        f.y += speed * dt;
        if (f.y > H) { f.y -= H; f.x = Math.random() * W; }
      }

      // Hindernisse spawnen (Rate steigt langsam mit der Distanz)
      spawnTimer -= dt;
      if (spawnTimer <= 0) {
        spawnObstacle();
        spawnTimer = clamp(1.15 - dist * 0.00007, 0.5, 1.15);
      }

      // Hindernisse bewegen, Kollision pruefen, aufraeumen
      for (let i = obstacles.length - 1; i >= 0; i--) {
        const o = obstacles[i];
        o.y += speed * dt;
        o.rot += o.rotSpeed * dt;
        // Hitbox etwas kleiner als Sprite -> fair zum Spieler
        if (duck.invuln <= 0 && hitCircleRect(duck.x, duck.y, 7, o.x - o.w / 2, o.y - o.h / 2, o.w, o.h)) {
          if (duck.shield) {
            // Seifenblase faengt einen Treffer ab und platzt
            duck.shield = false;
            duck.invuln = 0.8;
            spawnSplash(duck.x, duck.y, COL.foam, 14);
            sfx("dodge");
            obstacles.splice(i, 1);
            continue;
          }
          gameOver();
          return;
        }
        // knapp ausgewichen? -> Dodge-Sound + kleiner Spritzer (einmal pro Hindernis)
        if (!o.passed && o.y > duck.y && Math.abs(o.x - duck.x) < o.w / 2 + 13) {
          o.passed = true;
          sfx("dodge");
          spawnSplash(duck.x, duck.y - 4, COL.foam, 4);
        }
        if (o.y - o.h > H + 20) obstacles.splice(i, 1);
      }

      // Items bewegen + einsammeln
      for (let i = items.length - 1; i >= 0; i--) {
        const it = items[i];
        it.y += speed * dt;
        it.t += dt;
        if (hitCircleRect(duck.x, duck.y, 9, it.x - 6, it.y - 6, 12, 12)) {
          collectItem(it.type);
          items.splice(i, 1);
          continue;
        }
        if (it.y - 10 > H + 20) items.splice(i, 1);
      }

      // Whirlpools bewegen + Sog auf die Ente ausueben
      for (let i = whirls.length - 1; i >= 0; i--) {
        const wp = whirls[i];
        wp.y += speed * dt;
        wp.angle += dt * 2.5;
        const wx = wp.x - duck.x, wy = wp.y - duck.y;
        const d = Math.hypot(wx, wy);
        if (d < wp.r && d > 0.1) {
          const pull = (1 - d / wp.r) * 70 * dt;   // Sog staerker je naeher am Zentrum
          duck.x = clamp(duck.x + (wx / d) * pull, 8, W - 8);
        }
        if (wp.y - wp.r > H + 20) whirls.splice(i, 1);
      }

      // Item- und Whirlpool-Spawner
      itemTimer -= dt;
      if (itemTimer <= 0) { spawnItem(); itemTimer = 1.6 + Math.random() * 1.8; }
      whirlTimer -= dt;
      if (whirlTimer <= 0) { spawnWhirl(); whirlTimer = clamp(7 - dist * 0.0001, 3.5, 7) + Math.random() * 2; }
    }

    // Effekt beim Einsammeln eines Items
    function collectItem(type) {
      if (type === "squeak") { bonus += 15; sfx("squeak"); spawnSplash(duck.x, duck.y, COL.item, 8); }
      else if (type === "shield") { duck.shield = true; sfx("power"); spawnSplash(duck.x, duck.y, COL.item, 12); }
      else if (type === "turbo") { duck.turbo = 3.2; duck.invuln = 3.2; sfx("power"); spawnSplash(duck.x, duck.y, COL.item, 12); }
    }

    // Spritz-Partikel erzeugen (radial)
    function spawnSplash(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const sp = 20 + Math.random() * 60;
        particles.push({
          x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
          life: 0.3 + Math.random() * 0.3, max: 0.6, color, size: 1 + Math.random() * 2,
        });
      }
    }

    // Partikel bewegen + ausklingen (laeuft in jedem State weiter)
    function updateParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt; p.y += p.vy * dt;
        p.vx *= 0.92; p.vy *= 0.92;       // Reibung
        p.life -= dt;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    // ================================================================
    // === GAME-OVER ==================================================
    // ================================================================
    function gameOver() {
      state = STATE.OVER;
      sfx("over");
      shakeT = 0.4;
      spawnSplash(duck.x, duck.y, COL.foam, 16);
      gameOverMsg = QUACKS[Math.floor(Math.random() * QUACKS.length)];
      newBest = score > best;
      if (newBest) {
        best = score;
        localStorage.setItem("rdrr_best", String(best));
      }
    }

    // ================================================================
    // === RENDER =====================================================
    // ================================================================
    function drawWater() {
      if (imgReady(IMG.water)) {
        // gekachelte, vertikal scrollende Wasser-Textur
        const th = W;   // 1:1-Textur auf Canvas-Breite skaliert
        for (let y = (scrollY % th) - th; y < H; y += th) {
          ctx.drawImage(IMG.water, 0, Math.round(y), W, th);
        }
      } else {
        ctx.fillStyle = COL.water;
        ctx.fillRect(0, 0, W, H);
      }
      // dezente Schaum-Streifen (Bewegung + kaschieren die Kachel-Naht)
      for (const f of foam) {
        ctx.fillStyle = f.deep ? COL.waterDeep : COL.foam;
        ctx.globalAlpha = f.deep ? 0.28 : 0.42;
        ctx.fillRect(Math.round(f.x), Math.round(f.y), f.w, 2);
      }
      ctx.globalAlpha = 1;
    }

    // Pixel-Helfer
    function px(x, y, w, h, color) { ctx.fillStyle = color; ctx.fillRect(x, y, w, h); }

    // Felsen / Treibholz — generiertes Sprite (Fallback: Pixel-Block)
    function drawObstacle(o) {
      const img = o.type === "rock" ? IMG.rock : IMG.log;
      if (imgReady(img)) {
        ctx.save();
        ctx.translate(o.x, o.y);
        ctx.rotate(o.rot);
        const s = o.w * (o.type === "rock" ? 1.35 : 1.18);   // Holz weniger aufblasen
        ctx.drawImage(img, -s / 2, -s / 2, s, s);
        ctx.restore();
        return;
      }
      // Fallback: Pixel-Block
      ctx.save();
      ctx.translate(Math.round(o.x), Math.round(o.y));
      if (o.type === "rock") {
        const r = o.w / 2;
        px(-r, -r + 2, o.w, o.h - 4, COL.obstacle);
        px(-r + 2, -r, o.w - 4, o.h, COL.obstacle);
        ctx.globalAlpha = 0.5; px(-r + 3, -r + 1, 3, 2, COL.foam); ctx.globalAlpha = 1;
        ctx.fillStyle = "rgba(0,0,0,0.22)"; ctx.fillRect(-r + 2, r - 4, o.w - 4, 2);
      } else {
        ctx.rotate(o.rot);
        const w = o.w, h = o.h;
        px(-w / 2, -h / 2, w, h, COL.obstacle);
        ctx.fillStyle = "rgba(0,0,0,0.22)";
        ctx.fillRect(-w / 2 + 2, -1, w - 4, 1);
        ctx.fillRect(-w / 2 + 4, -h / 2 + 2, w - 8, 1);
        ctx.globalAlpha = 0.4; px(-w / 2 + 1, h / 2 - 2, w - 2, 1, COL.foam); ctx.globalAlpha = 1;
      }
      ctx.restore();
    }

    // Items — generiertes Sprite, leicht pulsierend (Fallback: Pixel-Icon)
    function drawItem(it) {
      const pulse = 1 + 0.12 * Math.sin(it.t * 8);
      const img = it.type === "squeak" ? IMG.star : it.type === "shield" ? IMG.shield : IMG.turbo;
      if (imgReady(img)) {
        const s = 18 * pulse;
        ctx.drawImage(img, it.x - s / 2, it.y - s / 2, s, s);
        return;
      }
      // Fallback: Pixel-Icon
      ctx.save();
      ctx.translate(Math.round(it.x), Math.round(it.y));
      ctx.scale(pulse, pulse);
      if (it.type === "squeak") {
        px(-4, -3, 8, 6, COL.item);
        px(-3, -4, 6, 8, COL.item);
        ctx.globalAlpha = 0.9; px(-2, -3, 2, 2, COL.foam); ctx.globalAlpha = 1;
      } else if (it.type === "shield") {
        ctx.strokeStyle = COL.item; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI * 2); ctx.stroke();
        ctx.globalAlpha = 0.8; px(-3, -3, 2, 2, COL.foam); ctx.globalAlpha = 1;
      } else {
        px(-1, -5, 2, 10, COL.item);
        px(-4, -2, 3, 2, COL.item);
        px( 1, -2, 3, 2, COL.item);
      }
      ctx.restore();
    }

    // Whirlpool: rotierende Spiral-Ringe im Wasser (Sog-Andeutung)
    function drawWhirl(wp) {
      ctx.save();
      ctx.translate(Math.round(wp.x), Math.round(wp.y));
      ctx.rotate(wp.angle);
      ctx.strokeStyle = COL.waterDeep; ctx.lineWidth = 2;
      ctx.globalAlpha = 0.55;
      for (let k = 1; k <= 3; k++) {
        ctx.beginPath();
        ctx.arc(0, 0, wp.r * 0.32 * k, k * 0.5, k * 0.5 + Math.PI * 1.3);
        ctx.stroke();
      }
      ctx.globalAlpha = 0.7; px(-2, -2, 4, 4, COL.foam); ctx.globalAlpha = 1;
      ctx.restore();
    }

    // Spritz-Partikel zeichnen (blenden mit der Restlebenszeit aus)
    function drawParticles() {
      for (const p of particles) {
        ctx.globalAlpha = clamp(p.life / p.max, 0, 1);
        px(Math.round(p.x), Math.round(p.y), p.size, p.size, p.color);
      }
      ctx.globalAlpha = 1;
    }

    // Enten-Sprite um den Ursprung (0,0) — wiederverwendbar (Spiel + Start-Screen)
    function drawDuckSprite() {
      if (imgReady(IMG.duck)) {
        const s = 40;   // generiertes Enten-Sprite (etwas groesser wegen transparentem Rand)
        ctx.drawImage(IMG.duck, -s / 2, -s / 2, s, s);
        return;
      }
      // Fallback: Pixel-Ente
      px(-6, -8, 12, 2, COL.duck);
      px(-8, -6, 16, 4, COL.duck);
      px(-9, -2, 18, 6, COL.duck);
      px(-8,  4, 16, 4, COL.duck);
      px(-6,  8, 12, 2, COL.duck);
      // Kopf
      px(-4, -13, 8, 6, COL.duck);
      px(-3, -15, 6, 2, COL.duck);
      // Schnabel (orange, nach vorn)
      px(-2, -17, 4, 2, COL.beak);
      px(-3, -16, 6, 1, COL.beak);
      // Augen
      px(-3, -12, 1, 1, "#1a1a1a");
      px( 2, -12, 1, 1, "#1a1a1a");
    }

    // Gummiente von oben (top-down): Wasser-Schatten + Power-up-Effekte + Neigung
    function drawDuck() {
      ctx.fillStyle = "rgba(0,0,0,0.16)";
      ctx.beginPath();
      ctx.ellipse(duck.x, duck.y + 7, 11, 5, 0, 0, Math.PI * 2);
      ctx.fill();

      // Turbo: Speed-Linien hinter der Ente (Signalfarbe foam)
      if (duck.turbo > 0) {
        ctx.globalAlpha = 0.5 + 0.3 * Math.sin(duck.turbo * 30);
        for (let k = 0; k < 3; k++) px(duck.x - 6 + k * 5, duck.y + 12 + k * 4, 2, 6, COL.foam);
        ctx.globalAlpha = 1;
      }

      // Ente blinkt waehrend Unverwundbarkeit nach Schild-Treffer
      const blink = duck.invuln > 0 && duck.turbo <= 0 && Math.floor(duck.invuln * 12) % 2 === 0;
      if (!blink) {
        // Gummi-Squash: schnelle Bewegung dehnt die Ente seitlich (Gummiente!)
        const sq = clamp(Math.abs(duck.vx) * 0.05, 0, 0.28);
        ctx.save();
        ctx.translate(Math.round(duck.x), Math.round(duck.y));
        ctx.rotate(duck.tilt);
        ctx.scale(1 + sq, 1 - sq * 0.7);
        drawDuckSprite();
        ctx.restore();
      }

      // Seifenblasen-Schild: heller Ring um die Ente (Signalfarbe foam + pinker Schimmer)
      if (duck.shield) {
        ctx.globalAlpha = 0.85;
        ctx.strokeStyle = COL.foam; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(duck.x, duck.y - 1, 14, 0, Math.PI * 2); ctx.stroke();
        ctx.globalAlpha = 0.4;
        ctx.strokeStyle = COL.item;
        ctx.beginPath(); ctx.arc(duck.x, duck.y - 1, 14, 0.5, 2.2); ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }

    function drawHUD() {
      ctx.font = "bold 13px 'Trebuchet MS', monospace";
      ctx.textAlign = "left";
      ctx.fillStyle = "#0c2b29";            // Schatten fuer Lesbarkeit
      ctx.fillText(String(score), 7, 17);
      ctx.fillStyle = COL.foam;             // Haupttext
      ctx.fillText(String(score), 6, 16);

      // aktive Power-ups oben rechts (unter dem Mute-Button)
      ctx.textAlign = "right";
      ctx.font = "bold 9px 'Trebuchet MS', monospace";
      let hy = 32;
      if (duck.shield) { ctx.fillStyle = COL.foam; ctx.fillText("SCHILD", W - 6, hy); hy += 11; }
      if (duck.turbo > 0) { ctx.fillStyle = COL.item; ctx.fillText("TURBO", W - 6, hy); }
    }

    function drawStart() {
      // halbtransparentes Panel
      ctx.fillStyle = "rgba(12,43,41,0.55)";
      ctx.fillRect(0, 0, W, H);
      ctx.textAlign = "center";

      ctx.fillStyle = COL.duck;
      ctx.font = "bold 20px 'Trebuchet MS', sans-serif";
      ctx.fillText("RUBBER DUCK", W / 2, 84);
      ctx.fillText("RIVER RUN", W / 2, 108);

      ctx.fillStyle = COL.foam;
      ctx.globalAlpha = 0.7;
      ctx.font = "italic 9px 'Trebuchet MS', sans-serif";
      ctx.fillText("Rubber-Duck-Debugging als Sport", W / 2, 124);
      ctx.globalAlpha = 1;

      // prominente Hero-Ente, knallgelb ueber dem Panel
      ctx.save();
      ctx.translate(W / 2, 158);
      ctx.scale(1.6, 1.6);
      drawDuckSprite();
      ctx.restore();

      ctx.fillStyle = COL.foam;
      ctx.font = "12px 'Trebuchet MS', sans-serif";
      ctx.fillText("Tipp = Start", W / 2, 212);
      ctx.fillText("Finger ziehen = lenken", W / 2, 230);

      ctx.fillStyle = COL.item;
      ctx.font = "bold 12px 'Trebuchet MS', sans-serif";
      ctx.fillText("Best: " + best, W / 2, 262);
    }

    function drawGameOver() {
      ctx.fillStyle = "rgba(10,30,28,0.72)";
      ctx.fillRect(0, 0, W, H);
      ctx.textAlign = "center";

      ctx.fillStyle = COL.foam;
      ctx.font = "bold 22px 'Trebuchet MS', sans-serif";
      ctx.fillText("GAME OVER", W / 2, 112);

      ctx.fillStyle = COL.duck;
      ctx.font = "bold 30px 'Trebuchet MS', sans-serif";
      ctx.fillText(String(score), W / 2, 158);

      if (newBest) {
        ctx.fillStyle = COL.item;
        ctx.font = "bold 13px 'Trebuchet MS', sans-serif";
        ctx.fillText("NEW BEST!", W / 2, 184);
      } else {
        ctx.fillStyle = COL.foam;
        ctx.font = "12px 'Trebuchet MS', sans-serif";
        ctx.fillText("Best: " + best, W / 2, 184);
      }

      // Rubber-Duck-Debugging-Spruch (Gruss an die Jury)
      ctx.fillStyle = COL.beak;
      ctx.font = "italic bold 11px 'Trebuchet MS', sans-serif";
      ctx.fillText('"' + gameOverMsg + '"', W / 2, 212);

      ctx.fillStyle = COL.foam;
      ctx.font = "12px 'Trebuchet MS', sans-serif";
      ctx.fillText("Tipp = nochmal", W / 2, 240);
    }

    // Mute-Button oben rechts (Lautsprecher an / durchgestrichen)
    function drawMuteButton() {
      const bx = W - 20, by = 7;
      ctx.save();
      ctx.globalAlpha = 0.92;
      px(bx, by + 3, 3, 5, COL.foam);
      px(bx + 2, by + 1, 2, 9, COL.foam);
      px(bx + 4, by - 1, 1, 13, COL.foam);
      if (muted) {
        ctx.strokeStyle = COL.item; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(bx + 7, by + 1); ctx.lineTo(bx + 13, by + 9); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(bx + 13, by + 1); ctx.lineTo(bx + 7, by + 9); ctx.stroke();
      } else {
        ctx.strokeStyle = COL.foam; ctx.lineWidth = 1; ctx.globalAlpha = 0.8;
        ctx.beginPath(); ctx.arc(bx + 4, by + 5, 4, -0.7, 0.7); ctx.stroke();
        ctx.beginPath(); ctx.arc(bx + 4, by + 5, 7, -0.7, 0.7); ctx.stroke();
      }
      ctx.restore();
    }

    function render() {
      ctx.setTransform(S, 0, 0, S, 0, 0);   // Basis: 180x320-Logik, scharf hochskaliert
      ctx.save();
      // Screen-Shake bei Aufprall (klingt aus)
      if (shakeT > 0) {
        const s = 6 * (shakeT / 0.4);
        ctx.translate((Math.random() - 0.5) * s, (Math.random() - 0.5) * s);
      }

      drawWater();
      for (const wp of whirls) drawWhirl(wp);
      for (const o of obstacles) drawObstacle(o);
      for (const it of items) drawItem(it);
      // fahrende Ente nur im Spiel / Game-Over (Start zeigt eigene Hero-Ente)
      if (state !== STATE.START) drawDuck();
      drawParticles();
      ctx.restore();

      // HUD & Overlays ohne Shake (bleiben ruhig lesbar)
      if (state === STATE.PLAY) drawHUD();
      if (state === STATE.START) drawStart();
      if (state === STATE.OVER) drawGameOver();
      drawMuteButton();   // immer sichtbar (alle States)
    }

    // ================================================================
    // === GAME-LOOP (requestAnimationFrame + Delta-Time) =============
    // ================================================================
    let last = performance.now();
    function frame(now) {
      const dt = Math.min(0.05, (now - last) / 1000); // clamp gegen Tab-Sprünge
      last = now;
      if (state === STATE.PLAY) update(dt);
      if (shakeT > 0) shakeT -= dt;     // Shake klingt auch im Game-Over aus
      updateParticles(dt);              // Partikel laufen in jedem State weiter
      render();
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    // ================================================================
    // === HILFSFUNKTIONEN ============================================
    // ================================================================
    function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

    // Kollision: Kreis (Ente) gegen Rechteck (Hindernis-Hitbox)
    function hitCircleRect(cx, cy, r, rx, ry, rw, rh) {
      const nx = clamp(cx, rx, rx + rw);
      const ny = clamp(cy, ry, ry + rh);
      const dx = cx - nx, dy = cy - ny;
      return dx * dx + dy * dy < r * r;
    }
  })();
  </script>
</body>
